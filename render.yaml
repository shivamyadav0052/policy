services:
  - type: web
    name: policysphere-backend
    runtime: java
    runtimeVersion: "17"
    buildCommand: "cd policy-sphere-backend-springboot && mvn clean package -DskipTests"
    startCommand: "java -jar policy-sphere-backend-springboot/target/insurance-policy-management-0.0.1-SNAPSHOT.jar"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: policysphere-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: policysphere-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: policysphere-db
          property: password
      - key: JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: PORT
        value: "10000"

databases:
  - name: policysphere-db
    databaseName: insurance_db
    user: policysphere_user
    plan: free
