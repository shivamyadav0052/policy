spring.application.name=insurance-policy-management


# Database configuration
# Use SPRING_DATASOURCE_URL when available, otherwise fallback to DATABASE_URL.
# Render DB connection strings may arrive as mysql://... so set SPRING_DATASOURCE_URL explicitly if needed.
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/insurance_db}}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8183}



spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB